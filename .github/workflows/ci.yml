name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Assemble library
        run: ./gradlew :browser-detect:assembleDebug --no-daemon

      - name: Assemble sample
        run: ./gradlew :sample:assembleDebug --no-daemon

      - name: Unit tests
        run: ./gradlew :browser-detect:testDebugUnitTest --no-daemon
